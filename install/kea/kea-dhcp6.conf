{
    "Dhcp6": {
        "interfaces-config": {
            "interfaces": [ "*" ]
        },

        "control-socket": {
            "socket-type": "unix",
            "socket-name": "/run/kea/kea6-ctrl-socket"
        },

        "lease-database": {
            "type": "memfile",
            "lfc-interval": 3600,
            "name": "/var/lib/kea/kea-leases6.csv"
        },

        "preferred-lifetime": 3000,
        "valid-lifetime": 4000,
        "renew-timer": 1000,
        "rebind-timer": 2000,

        "subnet6": [],

        "loggers": [
            {
                "name": "kea-dhcp6",
                "output_options": [
                    { "output": "/var/log/kea/kea-dhcp6.log" }
                ],
                "severity": "INFO",
                "debuglevel": 0
            }
        ]
    }
}
