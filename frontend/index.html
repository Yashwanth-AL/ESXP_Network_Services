<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESXP Network Services</title>
  <link rel="icon" href="/assets/favicon.png" type="image/png">
  <!-- ?v is bumped whenever a frontend asset changes: a new URL is a guaranteed
       cache-miss so browsers fetch the update instead of a stale copy. The
       server also sends Cache-Control: no-cache as a safety net. -->
  <link rel="stylesheet" href="/css/styles.css?v=4">
</head>
<body>
  <div id="app"></div>
  <div id="modal-root"></div>
  <div id="toast-root" aria-live="polite"></div>

  <!-- Load order matters: helpers first, bootstrap last. No build step, no CDN. -->
  <script src="/js/util.js?v=4"></script>
  <script src="/js/toast.js?v=4"></script>
  <script src="/js/api.js?v=4"></script>
  <script src="/js/validation.js?v=4"></script>
  <script src="/js/views/login.js?v=4"></script>
  <script src="/js/views/dhcp.js?v=4"></script>
  <script src="/js/views/leases.js?v=4"></script>
  <script src="/js/views/settings.js?v=4"></script>
  <script src="/js/views/placeholder.js?v=4"></script>
  <script src="/js/app.js?v=4"></script>
</body>
</html>
